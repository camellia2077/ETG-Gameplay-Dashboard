## Settings file was created for ETG-Gameplay-Dashboard defaults.
## Plugin GUID: randomgun.randomloadout

[General]
## Enable or disable the automatic start-of-run loadout grant.
# Setting type: Boolean
# Default value: true
EnableRandomLoadout = true

[UI]
## Command panel language. Use auto, en, or zh-CN.
# Setting type: String
# Default value: auto
Language = auto

## Command panel keyboard toggle key. Use a Unity KeyCode name such as F7, F8, Insert, or BackQuote.
# Setting type: String
# Default value: F7
CommandPanelKey = F7

## Controller shortcut for opening the command panel. Supported values: LB+R3, LB+X, LB+Y, or R3.
# Setting type: String
# Default value: LB+R3
CommandPanelControllerShortcut = LB+R3

## Disable the controller shortcut for opening or closing the command panel. The keyboard shortcut remains available.
# Setting type: Boolean
# Default value: false
DisableCommandPanelControllerShortcut = false

[StartItems]
## Active start-items preset id loaded from ETG-Gameplay-Dashboard preset files.
# Setting type: String
# Default value: default
ActivePreset = default

## Settings file was created for ETG-Gameplay-Dashboard defaults.
## Plugin GUID: randomgun.randomloadout

[General]
## Enable or disable the automatic start-of-run loadout grant.
# Setting type: Boolean
# Default value: true
EnableRandomLoadout = true

[UI]
## Command panel language. Use auto, en, or zh-CN.
# Setting type: String
# Default value: auto
Language = auto

## Command panel keyboard toggle key. Use a Unity KeyCode name such as F7, F8, Insert, or BackQuote.
# Setting type: String
# Default value: F7
CommandPanelKey = F7

## Room enemy rewind keyboard shortcut. Use a Unity KeyCode name such as C, Z, X, or V.
# Setting type: String
# Default value: C
RoomEnemyRewindKey = C

## Enable recording of standard and Boss room enemy waves for Rewind. Disabled by default.
# Setting type: Boolean
# Default value: false
RoomEnemyRefreshRecordingEnabled = false

## Room enemy refresh mode. Use rewind or respawn.
# Setting type: String
# Default value: rewind
RoomEnemyRefreshMethod = rewind

## Restore the player's recorded state when rewinding a Boss room. Disabled by default.
# Setting type: Boolean
# Default value: false
BossPlayerRewindEnabled = false

## Remove room decals, scene drops, currency, and Boss reward pedestals before rewinding. Enabled by default.
# Setting type: Boolean
# Default value: true
RoomRewindCleanupEnabled = true

## Controller shortcut for opening the command panel. Supported values: LB+R3, LB+X, LB+Y, or R3.
# Setting type: String
# Default value: LB+R3
CommandPanelControllerShortcut = LB+R3

## Disable the controller shortcut for opening or closing the command panel. The keyboard shortcut remains available.
# Setting type: Boolean
# Default value: false
DisableCommandPanelControllerShortcut = false

[StartItems]
## Active start-items preset id loaded from ETG-Gameplay-Dashboard preset files.
# Setting type: String
# Default value: default
ActivePreset = default
